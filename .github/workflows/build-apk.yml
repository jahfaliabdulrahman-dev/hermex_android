name: Build APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'app-spec/**'
      - '**.md'
      - '.DS_Store'
      - 'skills/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Android Preflight Check
        run: bash scripts/android-preflight.sh

      - name: SCSI L1 — Hunt (Bug Pattern Scan)
        run: python3 scripts/scsi-hunt.py --quick

      - name: SCSI L2 — Red Team Audit
        run: python3 scripts/scsi-redteam.py --attack ALL || true

      - name: SCSI L3-L5 — RCA + Gate Factory + Intelligence
        run: python3 scripts/scsi-engine.py --auto-fix || true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/hermex-release.jks
          echo "KEYSTORE_FILE=$GITHUB_WORKSPACE/hermex-release.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - run: flutter analyze

      - run: flutter test

      - run: flutter build apk --release

      - name: Delete old 'latest' tag (if exists)
        run: |
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create 'latest' tag at current commit
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest APK Build"
          body: "Automatically built from `main` — updated every push."
          prerelease: false
          make_latest: true
          files: build/app/outputs/flutter-apk/app-release.apk
