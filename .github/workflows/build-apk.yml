name: Build APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'app-spec/**'
      - '**.md'
      - '.DS_Store'
      - 'skills/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Android Preflight Check
        run: bash scripts/android-preflight.sh

      - name: SCSI L1 — Hunt (Bug Pattern Scan)
        run: python3 scripts/scsi-hunt.py --quick

      - name: SCSI L2 — Red Team Audit
        run: python3 scripts/scsi-redteam.py --attack ALL || true

      - name: SCSI L3-L5 — RCA + Gate Factory + Intelligence
        run: python3 scripts/scsi-engine.py --auto-fix || true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - name: Setup release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$STORE_PASS" ] || [ -z "$KEY_ALIAS" ]; then
            echo "::error::Missing one or more keystore secrets — cannot sign release APK"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/hermex-release.keystore
          printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../app/hermex-release.keystore\n" \
            "$STORE_PASS" "$KEY_PASS" "$KEY_ALIAS" > android/key.properties

      - run: flutter build apk --release

      - name: Delete old 'latest' tag (if exists)
        run: |
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create 'latest' tag at current commit
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest APK Build"
          body: "Automatically built from `main` — updated every push."
          prerelease: false
          make_latest: true
          files: build/app/outputs/flutter-apk/app-release.apk
