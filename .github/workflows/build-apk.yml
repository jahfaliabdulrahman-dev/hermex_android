name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Android Preflight Check
        run: bash scripts/android-preflight.sh

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - run: flutter build apk --release

      - name: Delete old 'latest' tag (if exists)
        run: |
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create 'latest' tag at current commit
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest APK Build"
          body: "Automatically built from `main` — updated every push."
          prerelease: false
          make_latest: true
          files: build/app/outputs/flutter-apk/app-release.apk
